name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: py_compile check
        run: python -m py_compile main.py && find . -name "*.py" -not -path "./tests/*" | xargs -I {} python -m py_compile {}
      - name: Lint and Type Check
        run: |
          flake8 .
          mypy .
      - name: Run tests
        run: pytest tests/ -v --cov=core --cov=api --cov=services --cov-report=term-missing --cov-fail-under=60

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: tsc --noEmit
      - name: Run tests
        run: vitest run --coverage
      - name: Build check
        run: npm run build
