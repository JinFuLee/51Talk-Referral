version: "3.9"

# ── 网络隔离 ─────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./config:/app/config
      - ./data:/app/data
      - ./key:/app/key
    environment:
      - PYTHONPATH=/app
    # 从 .env 文件读取额外环境变量（文件不存在时忽略，向后兼容）
    env_file:
      - path: .env
        required: false
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    env_file:
      - path: .env
        required: false
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
